<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compétences — Joey</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">Portfolio</div>
    <button class="burger" onclick="toggleMenu()" aria-label="Menu">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="about.html">À propos</a></li>
      <li><a href="projects.html">Projets</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="skills.html">Compétences</a></li>
      <li><a href="veille.html">Veille</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<main class="page">
  <section class="section">
    <h1 class="title">Mes Compétences</h1>
    <p class="subtitle">Voici les technologies et outils que je maîtrise.</p>
  </section>

  <section class="skills-box">

    <div class="skill">
      <h3>HTML / CSS</h3>
      <div class="skill-bar">
        <div class="skill-level" data-width="85"></div>
      </div>
    </div>

    <div class="skill">
      <h3>PHP / MySQL</h3>
      <div class="skill-bar">
        <div class="skill-level" data-width="80"></div>
      </div>
    </div>

    <div class="skill">
      <h3>Python</h3>
      <div class="skill-bar">
        <div class="skill-level" data-width="75"></div>
      </div>
    </div>

    <div class="skill">
      <h3>Java / Algorithmique</h3>
      <div class="skill-bar">
        <div class="skill-level" data-width="60"></div>
      </div>
    </div>

    <div class="skill">
      <h3>Git</h3>
      <div class="skill-bar">
        <div class="skill-level" data-width="25"></div>
      </div>
    </div>

  </section>
</main>

<footer>
  <p>© <span id="year"></span> — Portfolio Joey</p>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("show");
}

/* Animation des barres au scroll */
const bars = document.querySelectorAll('.skill-level');

bars.forEach(bar => {
  const w = bar.dataset.width;
  bar.style.width = w + '%';
});

const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('animated');
  });
}, { threshold: 0.3 });

bars.forEach(b => observer.observe(b));
</script>
</body>
</html>
